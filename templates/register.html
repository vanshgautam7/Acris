<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — ACRIS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
  <link rel="stylesheet" href="/static/style.css?v=5" />
</head>
<body>

<nav class="navbar">
  <a href="/" class="logo"><span>ACRIS</span></a>
  <div class="nav-links">
    <button class="theme-toggle nav-theme-toggle" title="Toggle theme"><i class="fa fa-sun-o"></i></button>
    <a href="/login" class="btn btn-ghost">Sign In</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card fade-in">

    <div class="auth-logo">
      <a href="/" class="logo"><span>ACRIS</span></a>
    </div>

    <h2>Create account</h2>
    <p class="subtitle">Start your AI-powered job search today</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    {% if success %}
    <div class="alert alert-success" style="background:rgba(200,240,160,0.15);border:1px solid rgba(200,240,160,0.3);color:#c8f0a0;padding:1rem;border-radius:8px;margin-bottom:1rem;font-size:0.9rem;line-height:1.5;">
      ✅ {{ success }}
    </div>
    {% endif %}

    <!-- GOOGLE SIGNUP -->
    <form action="/auth/google" method="get">
      <button type="submit" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <path d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z" fill="#4285F4"/>
          <path d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2.04a4.8 4.8 0 0 1-7.18-2.53H1.83v2.07A8 8 0 0 0 8.98 17z" fill="#34A853"/>
          <path d="M4.5 10.49a4.8 4.8 0 0 1 0-3l-2.67-2.07a8 8 0 0 0 0 7.14l2.67-2.07z" fill="#FBBC05"/>
          <path d="M8.98 4.2c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.47A4.8 4.8 0 0 1 8.98 4.2z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
    </form>

    <div class="divider">or register with email</div>

    <!-- EMAIL REGISTER -->
    <form method="POST" action="/register">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-control" placeholder="Your name" required />
      </div>

      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Create a password" required />
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:0.5rem;">
        Create Account →
      </button>
    </form>

    <div class="auth-footer-link">
      Already have an account? <a href="/login">Sign in</a>
    </div>

  </div>
</div>

<script src="/static/theme.js"></script>
</body>
</html>
